# Verification steps: scripts/check-go.sh, scripts/check-web.sh
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check (Go lint)
        run: ./scripts/check-go.sh --lint-only --verbose

  go-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        group: [core, tasks, agents, harness]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check (Go tests — ${{ matrix.group }})
        run: ./scripts/check-go.sh --tests-only --group=${{ matrix.group }} --verbose

  web:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        group: [lint, build, test-unit, test-components, test-app, test-task-pages, test-task-create, test-settings, test-projects, test-worktrees]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Check (web - ${{ matrix.group }})
        run: ./scripts/check-web.sh --install --verbose --group=${{ matrix.group }}
