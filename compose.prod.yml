# Hamix production — taskapi image with host home + CLI bind mounts.
# Build: docker build -f docker/Dockerfile -t hamix/taskapi:latest .
# Run:   docker compose -f compose.prod.yml up
#
# Schema migrate is a separate release step (not on container start):
#   docker compose -f compose.prod.yml run --rm taskapi dbcheck -migrate
services:
  taskapi:
    image: hamix/taskapi:${TAG:-latest}
    env_file:
      - path: .env
        required: false
    environment:
      HAMIX_LISTEN_HOST: "0.0.0.0"
      HAMIX_PATH_MAP: ${HAMIX_PATH_MAP:-}
    ports:
      - "8080:8080"
    volumes:
      - ${HAMIX_HOST_HOME:-${HOME:-${USERPROFILE}}}:/host-home
      - ${HAMIX_HOST_CLI_DIR:-/usr/local/bin}:/host-cli:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
